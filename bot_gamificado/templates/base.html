<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ContratoBot Dashboard{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0f172a; color: white; }
        .sidebar { min-height: 100vh; background: #1e2937; padding: 20px; }
        .sidebar a { width: 100%; margin-bottom: 10px; text-align: left; }
        .content { padding: 30px; }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <div class="col-md-3 col-lg-2 sidebar">
            <h3 class="mb-4 text-center">⚡ CONTRATOBOT</h3>
            <a href="/" class="btn btn-primary">📊 Dashboard</a>
            <a href="/ranking" class="btn btn-success">🏆 Ranking</a>
            <a href="/equipos" class="btn btn-warning">👥 Equipos</a>
            <a href="/objetivos" class="btn btn-info">🎯 Objetivos</a>
            <a href="/misiones" class="btn btn-danger">📋 Misiones</a>
            <a href="/frases" class="btn btn-secondary">💬 Frases</a>
            <a href="/config" class="btn btn-light">⚙️ Configuración</a>
            <hr>
            <a href="/logout" class="btn btn-outline-danger">🚪 Cerrar Sesión</a>
        </div>

        <!-- Contenido principal -->
        <div class="col-md-9 col-lg-10 content">
            {% block content %}{% endblock %}
        </div>
    </div>
</div>
</body>
</html>
